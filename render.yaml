services:
  - type: web
    name: cf-metal-pintura-api
    runtime: node
    plan: free
    region: ohio
    branch: main
    rootDir: .
    buildCommand: npm run install:all && npm run prisma:generate && npm run build:api
    startCommand: npm run prisma:generate && npm run start:api
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.14.0
      - key: API_PREFIX
        value: /api
      - key: PDF_STORAGE_PATH
        value: storage/pdfs
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: WEB_URL
        sync: false
      - key: ADMIN_URL
        sync: false
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_USERNAME
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_SUPPORT_EMAIL
        sync: false
      - key: SEED_SUPPORT_USERNAME
        sync: false
      - key: SEED_SUPPORT_PASSWORD
        sync: false
